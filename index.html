<!DOCTYPE html>
<html>
<head>
  <title>Ashi's Progress Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body{margin:0;padding:14px;font-family:Arial;background:linear-gradient(135deg,#ffe1ec,#fff8fb);color:#3b2430}
    .box{max-width:1000px;margin:auto}
    .card{background:white;border-radius:18px;padding:14px;margin:10px 0;box-shadow:0 8px 25px #f3a6c5}
    h1,h2{color:#d63384;margin:8px 0}
    input,textarea{width:100%;padding:10px;margin:5px 0 9px;border-radius:10px;border:1px solid #f3a6c5}
    textarea{height:70px}
    button{background:#d63384;color:white;border:0;border-radius:12px;padding:10px 14px;font-weight:bold;margin:4px;cursor:pointer}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px}
    .stat{background:#fff0f6;border-radius:14px;padding:12px;text-align:center}
    .num{font-size:24px;font-weight:bold;color:#d63384}
    .bar{height:24px;background:#ffe3ec;border-radius:20px;overflow:hidden}
    .fill{height:100%;width:0%;background:#d63384}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th,td{border-bottom:1px solid #ffd1e3;padding:8px;text-align:left}
    th{background:#ffd6e6}
    .danger{background:#8b1e3f}
  </style>
</head>

<body>
<div class="box">

  <div class="card" style="text-align:center">
    <h1>🌸 Ashi's Pink Progress Tracker 🌸</h1>
    <p>Start: 71 kg | Goal: 55 kg | Daily progress report</p>
  </div>

  <div class="card">
    <h2>Progress Report</h2>
    <div class="bar"><div class="fill" id="fill"></div></div>

    <div class="grid">
      <div class="stat"><div class="num" id="current">--</div><p>Current</p></div>
      <div class="stat"><div class="num" id="lost">--</div><p>Lost</p></div>
      <div class="stat"><div class="num" id="left">--</div><p>Left</p></div>
      <div class="stat"><div class="num" id="count">0</div><p>Entries</p></div>
    </div>

    <p id="report">Add your first entry.</p>
  </div>

  <div class="card">
    <h2>Add Daily Entry</h2>

    <div class="grid">
      <div><label>Date</label><input type="date" id="date"></div>
      <div><label>Weight kg</label><input type="number" step="0.1" id="weight"></div>
      <div><label>Calories</label><input type="number" id="calories"></div>
      <div><label>Protein g</label><input type="number" id="protein"></div>
      <div><label>Steps</label><input type="number" id="steps"></div>
      <div><label>Water glasses</label><input type="number" id="water"></div>
    </div>

    <label>Meals / Notes / Cravings</label>
    <textarea id="notes"></textarea>

    <button onclick="saveEntry()">Save Entry 💕</button>
    <button onclick="clearForm()">Clear</button>
  </div>

  <div class="card">
    <h2>Daily History</h2>
    <div id="history"></div>
    <button onclick="exportData()">Export Backup</button>
    <button class="danger" onclick="clearAll()">Delete All</button>
  </div>

</div>

<script>
  const START = 71;
  const GOAL = 55;

  document.getElementById("date").valueAsDate = new Date();

  function getEntries(){
    return JSON.parse(localStorage.getItem("entries") || "[]");
  }

  function saveEntries(entries){
    localStorage.setItem("entries", JSON.stringify(entries));
  }

  function saveEntry(){
    let entry = {
      date: document.getElementById("date").value,
      weight: Number(document.getElementById("weight").value),
      calories: Number(document.getElementById("calories").value),
      protein: Number(document.getElementById("protein").value),
      steps: Number(document.getElementById("steps").value),
      water: Number(document.getElementById("water").value),
      notes: document.getElementById("notes").value
    };

    if(!entry.date || !entry.weight){
      alert("Date and weight are required");
      return;
    }

    let entries = getEntries();
    let old = entries.findIndex(e => e.date === entry.date);

    if(old >= 0){
      entries[old] = entry;
    } else {
      entries.push(entry);
    }

    entries.sort((a,b) => new Date(b.date) - new Date(a.date));
    saveEntries(entries);
    clearForm();
    render();
    alert("Saved 💗");
  }

  function clearForm(){
    document.getElementById("date").valueAsDate = new Date();
    document.getElementById("weight").value = "";
    document.getElementById("calories").value = "";
    document.getElementById("protein").value = "";
    document.getElementById("steps").value = "";
    document.getElementById("water").value = "";
    document.getElementById("notes").value = "";
  }

  function deleteEntry(date){
    let entries = getEntries().filter(e => e.date !== date);
    saveEntries(entries);
    render();
  }

  function render(){
    let entries = getEntries();
    document.getElementById("count").innerText = entries.length;

    if(entries.length === 0){
      document.getElementById("history").innerHTML = "No entries yet.";
      return;
    }

    let latest = entries[0];
    let lost = START - latest.weight;
    let left = latest.weight - GOAL;
    let percent = Math.round((lost / (START - GOAL)) * 100);

    if(percent < 0) percent = 0;
    if(percent > 100) percent = 100;

    document.getElementById("current").innerText = latest.weight + " kg";
    document.getElementById("lost").innerText = lost.toFixed(1) + " kg";
    document.getElementById("left").innerText = left.toFixed(1) + " kg";
    document.getElementById("fill").style.width = percent + "%";
    document.getElementById("report").innerText = percent + "% complete. You have " + left.toFixed(1) + " kg left.";

    let html = "<table><tr><th>Date</th><th>Weight</th><th>Cal</th><th>Protein</th><th>Steps</th><th>Water</th><th>Notes</th><th></th></tr>";

    entries.forEach(e => {
      html += "<tr><td>" + e.date + "</td><td>" + e.weight + " kg</td><td>" + (e.calories||"-") + "</td><td>" + (e.protein||"-") + "</td><td>" + (e.steps||"-") + "</td><td>" + (e.water||"-") + "</td><td>" + (e.notes||"-") + "</td><td><button class='danger' onclick=\"deleteEntry('" + e.date + "')\">Delete</button></td></tr>";
    });

    html += "</table>";
    document.getElementById("history").innerHTML = html;
  }

  function exportData(){
    let data = JSON.stringify(getEntries(), null, 2);
    let blob = new Blob([data], {type:"application/json"});
    let link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "ashi-progress-backup.json";
    link.click();
  }

  function clearAll(){
    if(confirm("Delete all entries?")){
      localStorage.removeItem("entries");
      render();
    }
  }

  render();
</script>

</body>
</html>
